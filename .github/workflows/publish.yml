name: 'Publish'

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 7.42.0)'
        required: true
        type: string
      prerelease:
        description: '是否为预发布版本'
        required: false
        default: false
        type: boolean

jobs:
  # 获取版本信息并创建 Release
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
      release_upload_url: ${{ steps.create-release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # 确定版本号（手动触发使用输入值，自动触发使用 package.json）
      - name: get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      # 确定是否为预发布版本
      - name: determine prerelease
        id: get_prerelease
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            PRERELEASE="false"
          fi
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "Is prerelease: $PRERELEASE"

      # 获取 Release Notes
      - name: Generate Release Notes
        id: release_notes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NOTES="手动触发发布 v${{ steps.get_version.outputs.version }}"
          else
            NOTES=$(git log -1 --pretty=format:"%s" || echo "Release v${{ steps.get_version.outputs.version }}")
          fi
          echo "notes=$NOTES" >> $GITHUB_OUTPUT
          echo "Release notes: $NOTES"

      # 创建 GitHub Release
      - name: Create GitHub Release
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          release_name: Release v${{ steps.get_version.outputs.version }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: ${{ steps.get_prerelease.outputs.prerelease }}

      # 通知 UpgradeLink 平台有新版本（可选，如果平台支持）
      - name: Notify UpgradeLink
        run: |
          echo "Publishing version ${{ steps.get_version.outputs.version }} to UpgradeLink..."
          # UpgradeLink 通过 endpoints 配置自动检测新版本
          # 这里可以添加额外的平台 API 调用（如果需要）

  # 构建 Windows 版本
  build-windows:
    needs: create-release
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: install frontend dependencies
        run: pnpm install

      - name: install Tauri CLI
        run: cargo install tauri-cli

      - name: build Tauri app
        run: cargo tauri build

      # 查找并上传 MSI 安装包
      - name: Find MSI file
        id: find_msi
        run: |
          $msi = Get-ChildItem -Path "./src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          echo "msi_path=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          echo "msi_name=$($msi.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload MSI to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.release_upload_url }}
          asset_path: ${{ steps.find_msi.outputs.msi_path }}
          asset_name: ${{ steps.find_msi.outputs.msi_name }}
          asset_content_type: application/x-msi

      # 查找并上传 NSIS 安装包（如果有）
      - name: Find NSIS file
        id: find_nsis
        run: |
          $exe = Get-ChildItem -Path "./src-tauri/target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) {
            echo "nsis_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
            echo "nsis_name=$($exe.Name)" >> $env:GITHUB_OUTPUT
            echo "has_nsis=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "has_nsis=false" >> $env:GITHUB_OUTPUT
          }

      - name: Upload NSIS to Release
        if: steps.find_nsis.outputs.has_nsis == 'true'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.release_upload_url }}
          asset_path: ${{ steps.find_nsis.outputs.nsis_path }}
          asset_name: ${{ steps.find_nsis.outputs.nsis_name }}
          asset_content_type: application/x-msdownload

  # 上传更新元数据到 UpgradeLink 平台（可选，如果平台需要）
  publish-metadata:
    needs: [create-release, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup metadata
        run: |
          echo "Version: ${{ needs.create-release.outputs.version }}"
          echo "Release ID: ${{ needs.create-release.outputs.release_id }}"
          # UpgradeLink 通过 Tauri updater 配置自动获取更新
          # 如果需要手动推送元数据，可以在这里调用 UpgradeLink API
