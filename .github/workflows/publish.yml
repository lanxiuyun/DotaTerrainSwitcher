name: "release"

on:
  push:
    branches:
      - release
  workflow_dispatch: # 手动触发

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      appVersion: ${{ steps.get_version.outputs.appVersion }}
    steps:
      - uses: actions/checkout@v4

      - name: Get app version from tauri.conf.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "appVersion=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

  publish-tauri:
    needs: get-version
    permissions:
      contents: write
    outputs:
      appVersion: ${{ steps.tauri-action.outputs.appVersion }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - platform: "macos-latest" # for Arm based macs (M1 and above).
          #   args: "--target aarch64-apple-darwin"
          # - platform: "macos-latest" # for Intel based macs.
          #   args: "--target x86_64-apple-darwin"
          # - platform: "ubuntu-22.04" # for Tauri v2
          #   args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: install frontend dependencies
        run: pnpm install

      - name: Download Map Resources
        shell: powershell
        run: |
          $resourcesDir = "src-tauri/resources"
          $zipFile = "maps-resources.zip"
          $tag = "maps-resources-741"
          $repo = "${{ github.repository }}"

          # 检查 resources 目录是否已有内容
          if (Test-Path $resourcesDir) {
            $items = Get-ChildItem $resourcesDir -ErrorAction SilentlyContinue
            if ($items.Count -gt 0) {
              Write-Host "Resources directory already exists with $($items.Count) items, skipping download"
              exit 0
            }
          }

          # 获取 Release 下载 URL
          $apiUrl = "https://api.github.com/repos/$repo/releases/tags/$tag"
          Write-Host "Fetching release info from $apiUrl"

          $release = Invoke-RestMethod -Uri $apiUrl -Headers @{
            "Accept" = "application/vnd.github.v3+json"
            "Authorization" = "token ${{ secrets.GITHUB_TOKEN }}"
          } -ErrorAction Stop

          $asset = $release.assets | Where-Object { $_.name -eq $zipFile } | Select-Object -First 1
          if (-not $asset) {
            throw "Could not find $zipFile in release $tag"
          }

          $downloadUrl = $asset.browser_download_url
          Write-Host "Downloading from $downloadUrl"

          # 下载文件
          Invoke-WebRequest -Uri $downloadUrl -OutFile $zipFile -Headers @{
            "Accept" = "application/octet-stream"
            "Authorization" = "token ${{ secrets.GITHUB_TOKEN }}"
          }

          # 解压
          Expand-Archive -Path $zipFile -DestinationPath $resourcesDir -Force
          Remove-Item $zipFile

          Write-Host "Map resources downloaded and extracted successfully"
          Get-ChildItem $resourcesDir

      - uses: tauri-apps/tauri-action@v0
        id: tauri-action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "刀刀小工具 v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  upgradeLink-upload:
    needs:
      - get-version
      - publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-latest
    environment: tauri
    steps:
      - name: Send a request to UpgradeLink
        uses: toolsetlink/upgradelink-action@3.0.2
        with:
          access_key: ${{ secrets.UPGRADE_LINK_ACCESS_KEY }}
          access_secret: ${{ secrets.UPGRADE_LINK_ACCESS_SECRET }}
          config: |
            {
              "app_type": "tauri",
              "request": {
                "app_key": "${{ secrets.UPGRADE_LINK_TAURI_KEY }}",
                "latest_json_url": "https://github.com/${{ github.repository }}/releases/download/v${{ needs.publish-tauri.outputs.appVersion }}/latest.json"
              }
            }
