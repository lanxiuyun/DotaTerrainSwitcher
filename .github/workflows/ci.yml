name: 'CI - Build Test'

on:
  pull_request:
    branches:
      - main
      - release
  push:
    branches:
      - main

jobs:
  # 前端代码检查
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: install frontend dependencies
        run: pnpm install

      - name: run type check
        run: pnpm vue-tsc --noEmit

  # 构建测试（不打包）
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: install frontend dependencies
        run: pnpm install

      - name: build frontend
        run: pnpm build

      - name: build Tauri (debug)
        run: |
          cargo build --manifest-path src-tauri/Cargo.toml
